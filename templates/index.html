<!DOCTYPE html>
<html>
<head>
    <title>Rastreador de Rota VIP</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: white; margin: 0; padding: 20px; }
        #map { height: 75vh; width: 100%; border-radius: 15px; margin-top: 10px; }
        .status { font-size: 14px; color: #aaa; }
    </style>
</head>
<body>
    <h2>📍 Histórico de Rota</h2>
    <p id="info" class="status">Aguardando coordenadas...</p>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Inicia o mapa (Centro aproximado baseado nos seus logs)
        var map = L.map('map').setView([-29.7435, -52.4067], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        var marker = null;
        // Cria a linha (polyline) que vai conectar os pontos. Cor vermelha, espessura 4.
        var polyline = L.polyline([], {color: '#ff3333', weight: 4}).addTo(map);

        function atualizarMapa() {
            fetch('/data')
                .then(res => res.json())
                .then(data => {
                    if (data.length === 0) return; // Se não tem rota, não faz nada

                    // Transforma o JSON do Python em um formato que a linha do Leaflet entende
                    var latlngs = data.map(ponto => [ponto.lat, ponto.lon]);
                    
                    // Atualiza a linha com todos os pontos
                    polyline.setLatLngs(latlngs);
                    
                    // Pega o último ponto para atualizar o marcador
                    var ultimoPonto = data[data.length - 1];
                    var pos = [ultimoPonto.lat, ultimoPonto.lon];

                    if (!marker) {
                        marker = L.marker(pos).addTo(map);
                        map.setView(pos, 15); // Centraliza na primeira vez
                    } else {
                        marker.setLatLng(pos);
                    }

                    // Opcional: Faz o mapa afastar/aproximar automaticamente para caber a rota inteira
                    map.fitBounds(polyline.getBounds());

                    document.getElementById('info').innerText = 
                        "Última atualização: " + ultimoPonto.timestamp + 
                        " | Pontos registrados: " + data.length;
                })
                .catch(err => console.error("Erro ao buscar dados:", err));
        }

        setInterval(atualizarMapa, 3000);
        atualizarMapa();
    </script>
</body>
</html>
