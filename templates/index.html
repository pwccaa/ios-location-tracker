<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Tracker Pro Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* Paleta de Cores Premium (Tailwind-inspired) */
        :root { 
            --bg-body: #0f172a; 
            --bg-card: #1e293b; 
            --bg-card-hover: #273549;
            --accent: #0ea5e9; 
            --accent-glow: rgba(14, 165, 233, 0.4);
            --text-main: #f8fafc; 
            --text-muted: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --danger-hover: #dc2626;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg-body); 
            color: var(--text-main); 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden; 
        }

        /* Header / Navbar */
        header {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #334155;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 2000;
        }

        .brand { font-size: 1.2rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .brand span { color: var(--accent); }
        
        .btn-logout {
            background: var(--danger); color: white; text-decoration: none;
            padding: 6px 14px; border-radius: 6px; font-size: 13px; font-weight: 600;
            transition: all 0.2s; box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2);
        }
        .btn-logout:hover { background: var(--danger-hover); transform: translateY(-1px); }

        /* Container do Mapa */
        #map-container { position: relative; height: 50vh; width: 100%; border-bottom: 2px solid var(--accent); }
        #map { height: 100%; width: 100%; z-index: 1; }
        
        /* Overlay "Aguardando Sinal" (Com Efeito Blur Premium) */
        #status-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(8px);
            z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: all 0.6s ease; pointer-events: none; text-align: center;
        }
        .hidden { opacity: 0; visibility: hidden; transform: scale(1.05); }

        #status-overlay h2 { margin: 0 0 10px 0; font-size: 1.8rem; letter-spacing: -0.5px; }
        #status-overlay p { color: var(--text-muted); margin: 0; }

        /* Histórico e Cards */
        #history { padding: 25px 20px; max-width: 900px; margin: auto; }
        .section-title { 
            font-size: 1rem; color: var(--text-muted); text-transform: uppercase; 
            letter-spacing: 1.5px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px;
        }
        .section-title::after { content: ''; flex: 1; height: 1px; background: #334155; }

        .route-card { 
            background: var(--bg-card); border-radius: 12px; padding: 18px 20px; 
            margin-bottom: 15px; cursor: pointer; border: 1px solid #334155;
            transition: all 0.2s ease; display: flex; flex-direction: column; gap: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .route-card:hover { 
            border-color: var(--accent); background: var(--bg-card-hover); 
            transform: translateY(-3px); box-shadow: 0 10px 15px -3px var(--accent-glow);
        }

        .route-header { display: flex; justify-content: space-between; align-items: center; }
        .route-id { font-size: 1.1rem; font-weight: 600; color: #fff; }
        
        .tag-active { 
            background: rgba(16, 185, 129, 0.15); color: var(--success); border: 1px solid var(--success);
            padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
            display: flex; align-items: center; gap: 5px;
        }
        .tag-active::before { content: ''; display: block; width: 6px; height: 6px; background: var(--success); border-radius: 50%; animation: pulse 1.5s infinite; }
        .tag-finished { color: var(--text-muted); font-size: 12px; font-weight: 500; background: rgba(255,255,255,0.05); padding: 4px 10px; border-radius: 20px;}

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); } 70% { box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }

        .route-details { font-size: 13.5px; color: var(--text-muted); display: flex; gap: 20px; }
        .detail-item { display: flex; align-items: center; gap: 5px; }

        /* Customização Leaflet */
        .leaflet-control-zoom { border: none !important; box-shadow: 0 4px 15px rgba(0,0,0,0.3) !important; }
        .leaflet-bar a { background-color: var(--bg-card) !important; color: #fff !important; border-bottom-color: #334155 !important; }
        .leaflet-bar a:hover { background-color: var(--bg-card-hover) !important; }
    </style>
</head>
<body>

    <header>
        <div class="brand">
            🧭 Tracker<span>Pro</span>
        </div>
        <a href="/logout" class="btn-logout">Sair</a>
    </header>

    <div id="map-container">
        <div id="status-overlay">
            <h2>Radar Offline</h2>
            <p>Aguardando novo sinal do iPhone...</p>
        </div>
        <div id="map"></div>
    </div>

    <div id="history">
        <div class="section-title">Histórico de Viagens</div>
        <div id="route-list">
            </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Configuração do mapa (Zoom no canto inferior para não atrapalhar o topo)
        var map = L.map('map', { zoomControl: false }).setView([-29.7435, -52.4067], 15);
        L.control.zoom({ position: 'bottomright' }).addTo(map);
        
        // Estilo do mapa (CartoDB Dark Matter para combinar com o Dark Mode)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap © CartoDB',
            subdomains: 'abcd',
            maxZoom: 19
        }).addTo(map);
        
        var currentPolyline = L.polyline([], { color: '#0ea5e9', weight: 5, opacity: 0.9, lineJoin: 'round' }).addTo(map);
        var marker = L.circleMarker([0,0], { radius: 7, fillColor: "#0ea5e9", color: "#fff", weight: 2, fillOpacity: 1 }).addTo(map);

        // Snap to Road (OSRM)
        async function getSnappedRoute(pontos) {
            if (pontos.length < 2) return pontos.map(p => [p.lat, p.lon]);
            const coords = pontos.map(p => `${p.lon},${p.lat}`).join(';');
            try {
                const response = await fetch(`https://router.project-osrm.org/route/v1/driving/${coords}?overview=full&geometries=geojson`);
                const data = await response.json();
                if (data.routes && data.routes.length > 0) {
                    return data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
                }
            } catch (e) {
                console.error("Erro no SnapToRoad:", e);
            }
            return pontos.map(p => [p.lat, p.lon]);
        }

        async function updateUI() {
            try {
                const res = await fetch('/data');
                // Se o servidor retornar 401 (Não autorizado), redireciona para login
                if (res.status === 401) { window.location.href = '/login'; return; }
                
                const data = await res.json();
                const rotas = data.rotas;
                const idAtiva = data.ativa;
                const listContainer = document.getElementById('route-list');
                const overlay = document.getElementById('status-overlay');

                // Atualiza o Mapa
                if (idAtiva && rotas[idAtiva]) {
                    overlay.classList.add('hidden');
                    const snappedCoords = await getSnappedRoute(rotas[idAtiva].pontos);
                    currentPolyline.setLatLngs(snappedCoords);
                    const lastP = rotas[idAtiva].pontos[rotas[idAtiva].pontos.length - 1];
                    marker.setLatLng([lastP.lat, lastP.lon]);
                    map.fitBounds(currentPolyline.getBounds(), {padding: [50, 50], maxZoom: 16});
                } else {
                    overlay.classList.remove('hidden');
                }

                // Renderiza a Lista de Cards
                if (Object.keys(rotas).length === 0) {
                    listContainer.innerHTML = '<p style="text-align:center; color: var(--text-muted); margin-top: 30px;">Nenhuma rota registrada nesta sessão.</p>';
                    return;
                }

                let htmlBuffer = '';
                const sortedIds = Object.keys(rotas).sort().reverse();
                
                sortedIds.forEach(id => {
                    const r = rotas[id];
                    const isActive = (id === idAtiva);
                    
                    htmlBuffer += `
                        <div class="route-card" onclick="focarRota('${id}')">
                            <div class="route-header">
                                <span class="route-id">Início às ${r.start}</span>
                                ${isActive ? '<span class="tag-active">RODANDO</span>' : `<span class="tag-finished">Finalizada: ${r.end}</span>`}
                            </div>
                            <div class="route-details">
                                <div class="detail-item">📌 ${r.pontos.length} pontos capturados</div>
                                <div class="detail-item">⏳ ${isActive ? 'Atualizando...' : 'Concluída'}</div>
                            </div>
                        </div>`;
                });
                
                listContainer.innerHTML = htmlBuffer;
                window.allRoutes = rotas;
            } catch (error) {
                console.error("Erro na atualização:", error);
            }
        }

        window.focarRota = async function(id) {
            const rota = window.allRoutes[id];
            if (!rota) return;
            const snappedCoords = await getSnappedRoute(rota.pontos);
            currentPolyline.setLatLngs(snappedCoords);
            marker.setLatLng(snappedCoords[snappedCoords.length - 1]);
            map.fitBounds(currentPolyline.getBounds(), {padding: [40, 40], maxZoom: 16});
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        setInterval(updateUI, 10000); // Atualiza a cada 10s
        updateUI();
    </script>
</body>
</html>
