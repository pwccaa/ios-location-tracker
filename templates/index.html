<!DOCTYPE html>
<html>
<head>
    <title>Rastreador Pro + SnapToRoad</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        #map-container { position: relative; height: 50vh; width: 100%; border-bottom: 3px solid var(--accent); }
        #map { height: 100%; width: 100%; }
        #status-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.85); z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s; pointer-events: none;
        }
        .hidden { opacity: 0; visibility: hidden; }
        #history { padding: 20px; max-width: 900px; margin: auto; }
        .route-card { 
            background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 12px; 
            cursor: pointer; border: 1px solid #334155; transition: 0.2s;
        }
        .route-card:hover { border-color: var(--accent); background: #253347; }
        .tag-active { background: #10b981; color: white; padding: 4px 10px; border-radius: 20px; font-size: 11px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% {opacity:1} 50% {opacity:0.5} 100% {opacity:1} }
    </style>
</head>
<body>

    <div id="map-container">
        <div id="status-overlay">
            <h2>Aguardando Sinal...</h2>
            <p>Nenhuma rota ativa detectada.</p>
        </div>
        <div id="map"></div>
    </div>

    <div id="history">
        <h3>🕒 Histórico de Viagens</h3>
        <div id="route-list"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map', { zoomControl: false }).setView([-29.7435, -52.4067], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        var currentPolyline = L.polyline([], {color: '#38bdf8', weight: 6, opacity: 0.8}).addTo(map);
        var marker = L.circleMarker([0,0], {radius: 8, fillColor: "#38bdf8", color: "#fff", weight: 2, fillOpacity: 1}).addTo(map);

        // MÁGICA: Função que consulta o OSRM para suavizar a rota
        async function getSnappedRoute(pontos) {
            if (pontos.length < 2) return pontos.map(p => [p.lat, p.lon]);
            
            const coords = pontos.map(p => `${p.lon},${p.lat}`).join(';');
            try {
                const response = await fetch(`https://router.project-osrm.org/route/v1/driving/${coords}?overview=full&geometries=geojson`);
                const data = await response.json();
                if (data.routes && data.routes.length > 0) {
                    return data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
                }
            } catch (e) {
                console.error("Erro no SnapToRoad:", e);
            }
            return pontos.map(p => [p.lat, p.lon]); // Fallback para linha reta
        }

        async function updateUI() {
            const res = await fetch('/data');
            const data = await res.json();
            const rotas = data.rotas;
            const idAtiva = data.ativa;
            const listContainer = document.getElementById('route-list');
            const overlay = document.getElementById('status-overlay');

            if (idAtiva && rotas[idAtiva]) {
                overlay.classList.add('hidden');
                const snappedCoords = await getSnappedRoute(rotas[idAtiva].pontos);
                currentPolyline.setLatLngs(snappedCoords);
                
                const lastP = rotas[idAtiva].pontos[rotas[idAtiva].pontos.length - 1];
                marker.setLatLng([lastP.lat, lastP.lon]);
                map.fitBounds(currentPolyline.getBounds(), {padding: [50, 50]});
            } else {
                overlay.classList.remove('hidden');
            }

            // Renderiza os Cards
            let htmlBuffer = '';
            const sortedIds = Object.keys(rotas).sort().reverse();
            sortedIds.forEach(id => {
                const r = rotas[id];
                const isActive = (id === idAtiva);
                htmlBuffer += `
                    <div class="route-card" onclick="focarRota('${id}')">
                        <div style="display:flex; justify-content:space-between; align-items:center">
                            <strong>Viagem ${r.start}</strong>
                            ${isActive ? '<span class="tag-active">AO VIVO</span>' : '<span style="color:#94a3b8;font-size:12px">Fim: '+r.end+'</span>'}
                        </div>
                        <small style="color:#64748b">${r.pontos.length} pontos registrados</small>
                    </div>`;
            });
            listContainer.innerHTML = htmlBuffer || '<p>Nenhuma rota.</p>';
            window.allRoutes = rotas;
        }

        window.focarRota = async function(id) {
            const rota = window.allRoutes[id];
            if (!rota) return;
            const snappedCoords = await getSnappedRoute(rota.pontos);
            currentPolyline.setLatLngs(snappedCoords);
            marker.setLatLng(snappedCoords[snappedCoords.length - 1]);
            map.fitBounds(currentPolyline.getBounds(), {padding: [40, 40]});
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        setInterval(updateUI, 10000); // 10s para não estourar limite de API
        updateUI();
    </script>
</body>
</html>
