<!DOCTYPE html>
<html>
<head>
    <title>Rastreador de Rotas Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; }
        body { font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; overflow-x: hidden; }
        
        /* Container do Mapa */
        #map-container { position: relative; height: 50vh; width: 100%; border-bottom: 3px solid var(--accent); box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        #map { height: 100%; width: 100%; z-index: 1; }
        
        /* Overlay de Status (Aparece quando está offline) */
        #status-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.85); z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s ease; pointer-events: none; text-align: center;
        }
        .hidden { opacity: 0; visibility: hidden; }

        /* Lista de Histórico */
        #history { padding: 20px; max-width: 900px; margin: auto; }
        h3 { border-left: 4px solid var(--accent); padding-left: 10px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }

        .route-card { 
            background: var(--card); border-radius: 12px; padding: 18px; 
            margin-bottom: 12px; cursor: pointer; border: 1px solid #334155;
            transition: all 0.2s ease; display: flex; flex-direction: column; gap: 5px;
        }
        .route-card:hover { border-color: var(--accent); transform: translateY(-2px); background: #253347; }
        .route-card:active { transform: translateY(0); }

        .route-header { display: flex; justify-content: space-between; align-items: center; }
        .route-id { font-weight: bold; color: var(--accent); }
        
        .tag-active { background: #10b981; color: white; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 800; animation: pulse 2s infinite; }
        .tag-finished { color: #94a3b8; font-size: 12px; }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .route-details { font-size: 13px; color: #94a3b8; display: flex; gap: 15px; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="map-container">
        <div id="status-overlay" id="overlay">
            <h2 id="status-msg">Aguardando Sinal...</h2>
            <p>Nenhuma rota ativa detectada no momento.</p>
        </div>
        <div id="map"></div>
    </div>

    <div id="history">
        <h3>🕒 Histórico de Viagens</h3>
        <div id="route-list">
            </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Configuração inicial do mapa
        var map = L.map('map', { zoomControl: false }).setView([-29.7435, -52.4067], 15);
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);
        
        var currentPolyline = L.polyline([], {
            color: '#38bdf8', 
            weight: 6, 
            opacity: 0.9,
            lineJoin: 'round'
        }).addTo(map);
        
        var marker = L.circleMarker([0,0], {
            radius: 8,
            fillColor: "#38bdf8",
            color: "#fff",
            weight: 2,
            fillOpacity: 1
        }).addTo(map);

        function updateUI() {
            fetch('/data')
                .then(res => res.json())
                .then(data => {
                    const rotas = data.rotas;
                    const idAtiva = data.ativa;
                    const listContainer = document.getElementById('route-list');
                    const overlay = document.getElementById('status-overlay');

                    // 1. Gerenciar Mapa e Overlay
                    if (idAtiva && rotas[idAtiva]) {
                        overlay.classList.add('hidden');
                        const pontos = rotas[idAtiva].pontos;
                        const latlngs = pontos.map(p => [p.lat, p.lon]);
                        
                        currentPolyline.setLatLngs(latlngs);
                        const lastP = latlngs[latlngs.length - 1];
                        marker.setLatLng(lastP);
                        
                        // Ajusta o zoom para a rota atual
                        map.fitBounds(currentPolyline.getBounds(), {padding: [50, 50]});
                    } else {
                        overlay.classList.remove('hidden');
                    }

                    // 2. Renderizar Histórico (Cards)
                    if (Object.keys(rotas).length === 0) {
                        listContainer.innerHTML = '<p style="text-align:center; color:#64748b;">Nenhuma viagem registrada ainda.</p>';
                        return;
                    }

                    let htmlBuffer = '';
                    // Ordena: IDs mais novos primeiro
                    const sortedIds = Object.keys(rotas).sort().reverse();

                    sortedIds.forEach(id => {
                        const r = rotas[id];
                        const isActive = (id === idAtiva);
                        
                        htmlBuffer += `
                            <div class="route-card" onclick="focarRota('${id}')">
                                <div class="route-header">
                                    <span class="route-id">Viagem ${r.start}</span>
                                    ${isActive ? '<span class="tag-active">AO VIVO</span>' : '<span class="tag-finished">Encerrada</span>'}
                                </div>
                                <div class="route-details">
                                    <span>📍 ${r.pontos.length} pontos</span>
                                    <span>⏱️ ${isActive ? 'Em curso...' : 'Fim: ' + r.end}</span>
                                </div>
                            </div>
                        `;
                    });
                    listContainer.innerHTML = htmlBuffer;

                    // Salva os dados globalmente para o clique nos cards funcionar
                    window.allRoutes = rotas;
                })
                .catch(err => console.error("Erro ao atualizar:", err));
        }

        // Função para quando clicar no card
        window.focarRota = function(id) {
            const rota = window.allRoutes[id];
            if (!rota) return;
            
            const latlngs = rota.pontos.map(p => [p.lat, p.lon]);
            currentPolyline.setLatLngs(latlngs);
            marker.setLatLng(latlngs[latlngs.length - 1]);
            map.fitBounds(currentPolyline.getBounds(), {padding: [30, 30]});
            
            // Scroll suave para o topo para ver o mapa
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        // Loop de atualização
        setInterval(updateUI, 4000);
        updateUI();
    </script>
</body>
</html>
