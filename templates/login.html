<!DOCTYPE html>
<html>
<head>
    <title>Login - Tracker VIP</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; }
        body { 
            font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); 
            display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; 
        }
        .login-box { 
            background: var(--card); padding: 40px 30px; border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; 
            width: 90%; max-width: 320px; border: 1px solid #334155; 
        }
        h2 { margin-top: 0; color: var(--accent); }
        input { 
            width: 100%; padding: 12px; margin: 15px 0; border-radius: 8px; 
            border: 1px solid #475569; background: #0f172a; color: white; 
            box-sizing: border-box; outline: none; font-size: 16px;
        }
        input:focus { border-color: var(--accent); }
        button { 
            width: 100%; padding: 12px; background: var(--accent); border: none; 
            border-radius: 8px; color: #0f172a; font-weight: bold; font-size: 16px;
            cursor: pointer; transition: 0.2s; margin-top: 10px;
        }
        button:hover { background: #0ea5e9; transform: translateY(-2px); }
        .error { color: #ef4444; font-size: 14px; margin-bottom: 10px; background: rgba(239, 68, 68, 0.1); padding: 8px; border-radius: 6px;}
    </style>
</head>
<body>
    <div class="login-box">
        <h2>📍 Tracker Pro</h2>
        <p style="font-size: 14px; color: #94a3b8; margin-bottom: 20px;">Área restrita</p>
        
        {% if erro %}
            <div class="error">{{ erro }}</div>
        {% endif %}
        
        <form method="POST">
            <input type="password" name="password" placeholder="Digite a senha" required autofocus>
            <button type="submit">Acessar Mapa</button>
        </form>
    </div>
</body>
</html>
